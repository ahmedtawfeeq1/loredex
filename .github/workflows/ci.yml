name: CI

on:
  push:
    branches: [main]
  pull_request:
    # skip run creation entirely for release-please PRs (they sit as "Action required"
    # noise otherwise — the approval gate fires before any job-level `if` can).
    # ponytail: a human PR touching ONLY these five files also skips CI; that shape is a release PR
    paths-ignore:
      - '.release-please-manifest.json'
      - 'CHANGELOG.md'
      - 'package.json'
      - 'package-lock.json'
      - 'plugin/.claude-plugin/plugin.json'

jobs:
  test:
    # release-please's PR only bumps version/changelog — CI on it is noise ("Action required" gate)
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
